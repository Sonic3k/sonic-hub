# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:angels_islands}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── B2 Storage ────────────────────────────────────────────────────────────────
storage.b2.endpoint=https://${B2_ENDPOINT:s3.us-east-005.backblazeb2.com}
storage.b2.region=${B2_REGION:us-east-005}
storage.b2.key-id=${B2_KEY_ID}
storage.b2.app-key=${B2_APP_KEY}
storage.b2.bucket=${B2_BUCKET:sonic-hub}
storage.cdn-base-url=${CDN_BASE:https://sonic-hub.b-cdn.net}
storage.prefix=angels-islands

# ── CORS ──────────────────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=*

# ── Anthropic (AI extraction) ────────────────────────────────────────────────
anthropic.api-key=${ANTHROPIC_API_KEY:}
