spring.application.name=sonic-hub-connector

# Server port (different from api)
server.port=${PORT:8081}

# Core API URL
sonic-hub.api-url=${SONIC_HUB_API_URL:http://localhost:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Telegram Bot (optional)
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.bot-username=${TELEGRAM_BOT_USERNAME:SonicHubBot}
telegram.owner-id=${TELEGRAM_OWNER_ID:}

# Railway API (optional)
railway.api-token=${RAILWAY_API_TOKEN:}
railway.projects.sonic-hub=b58d6387-f154-4c1a-b137-c8ecd728c4b5
railway.projects.mushroom-hills=76cb6207-b770-43b1-96f2-8c098c5405af
railway.projects.comparison-tool=cd467e6e-fef1-4bad-bdfd-982fd112e745
railway.projects.celestial=2d4f583b-0638-4df7-8c48-222429d5bdca
