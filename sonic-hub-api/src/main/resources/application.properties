spring.application.name=sonic-hub-api

# Railway injects these env vars automatically from PostgreSQL plugin
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:sonichub}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=${PORT:8080}

# Actuator health check (for Railway)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# CORS - allow all origins for now (tighten after frontend URL known)
spring.web.cors.allowed-origins=*

# Telegram Bot (optional — bot only starts when token is set)
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.bot-username=${TELEGRAM_BOT_USERNAME:SonicHubBot}
telegram.owner-id=${TELEGRAM_OWNER_ID:}
